spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/activos_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
server.address=0.0.0.0

# JWT Secrets and configurations
sgsi.app.jwtSecret=${JWT_SECRET:veryLongSecretKeyForJWTThatIsAtLeast256BitsRequiredByAlgorithm12345}
sgsi.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}